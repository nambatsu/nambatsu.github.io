<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>単振動＝円運動の正射影（横並び・同期／紙送り対応）</title>
  <style>
    :root { --bg:#f8fafc; --panel:#fff; --fg:#0f172a; --muted:#64748b; --line:#e5e7eb; --accent:#2563eb; --accent2:#16a34a; --shadow:0 6px 20px rgba(2,6,23,.08); --radius:18px; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Noto Sans,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;color:var(--fg);background:linear-gradient(180deg,#f8fafc,#eef2ff 60%)}
    header{padding:18px 20px 6px;text-align:center}
    header h1{margin:0;font-size:1.35rem;font-weight:800}
    header p{margin:6px 0 0;color:var(--muted)}
    .wrap{max-width:1220px;margin:14px auto 24px;padding:0 14px}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}

    .controls{display:grid;gap:10px;grid-template-columns:repeat(12,1fr);align-items:center;padding:14px;margin-bottom:12px}
    .controls .group{grid-column:span 6;display:grid;grid-template-columns:160px 1fr 80px;gap:8px;align-items:center}
    .controls .group.compact{grid-template-columns:auto auto auto auto auto 1fr;gap:12px}
    .controls label{color:var(--muted);font-size:.92rem}
    .controls output{text-align:right;font-variant-numeric:tabular-nums}
    select,button,.toggle{border:1px solid var(--line);background:#fff;color:var(--fg);padding:8px 12px;border-radius:12px;font-weight:700;cursor:pointer;box-shadow:var(--shadow)}
    .primary{background:var(--accent);color:#fff;border-color:transparent}
    .danger{background:#ef4444;color:#fff;border-color:transparent}

    .row{display:grid;grid-template-columns:1.25fr 1fr;gap:0}
    .canvasBox{position:relative;padding:12px}
    .canvasBox h3{margin:4px 0 10px;font-size:1rem;color:var(--muted);font-weight:800}
    canvas{display:block;border-radius:14px;background:#fff;border:1px solid var(--line)}

    .legend{position:absolute;inset:auto 12px 12px auto;background:rgba(255,255,255,.9);padding:6px 10px;border-radius:10px;border:1px solid var(--line);font-size:.85rem;color:var(--muted)}
    .legend .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:-1px}
    .eq{padding:10px 14px;font-size:.95rem;color:var(--muted);border-top:1px dashed var(--line)}

    @media (max-width:920px){.row{grid-template-columns:1fr}.canvasBox{padding:10px}}
  </style>
</head>
<body>
  <header>
    <h1>単振動 = 円運動の正射影（横並び・同期表示／紙送り対応）</h1>
    <p>左の円運動の投影が、右のグラフへ<strong>そのまま</strong>つながるように見える可視化。モード切替で「紙送り（ロール）」「スイープ（左→右）」が選べます。</p>
  </header>

  <div class="wrap">
    <section class="panel controls" aria-label="操作パネル">
      <div style="grid-column:span 12;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button id="playPause" class="primary">▶ 再生</button>
        <button id="reset" class="danger">↺ リセット</button>
        <label class="toggle"><input type="checkbox" id="showGuides" checked> ガイド表示</label>
        <label class="toggle"><input type="checkbox" id="showTrace" checked> サイン波トレース</label>
        <label class="toggle"><input type="checkbox" id="lockHeights" checked> 高さを同期</label>
      </div>

      <div class="group"><label for="omega">角速度 ω (rad/s)</label><input id="omega" type="range" min="0.2" max="6" step="0.1" value="1.6" /><output id="omegaVal">1.6</output></div>
      <div class="group"><label for="radius">半径 R (px)</label><input id="radius" type="range" min="40" max="180" step="1" value="110" /><output id="radiusVal">110</output></div>
      <div class="group"><label for="phi">初期位相 φ (rad)</label><input id="phi" type="range" min="-3.1416" max="3.1416" step="0.01" value="0" /><output id="phiVal">0.00</output></div>

      <div class="group compact"><label>投影軸:</label><label><input type="radio" name="axis" value="x"> x軸</label><label><input type="radio" name="axis" value="y" checked> y軸</label><span></span></div>
      <div class="group"><label for="drawMode">描画モード</label>
        <select id="drawMode">
          <option value="window" selected>タイムウィンドウ</option>
          <option value="roll">紙送り（ロール）</option>
          <option value="sweep">スイープ（左→右）</option>
        </select>
        <span></span>
      </div>
      <div class="group"><label for="paperSpeed">紙送り/スイープ速度 (px/s)</label><input id="paperSpeed" type="range" min="20" max="400" step="10" value="120" /><output id="paperSpeedVal">120</output></div>
    </section>

    <div class="row">
      <section class="panel canvasBox" aria-label="円と投影">
        <h3>円運動と投影（左）</h3>
        <canvas id="mainCanvas" aria-label="円運動キャンバス"></canvas>
        <div class="legend"><div><span class="dot" style="background:#2563eb"></span>回転点</div><div><span class="dot" style="background:#16a34a"></span>投影点</div></div>
        <div class="eq" id="equationArea">x(t) = R cos(ωt + φ)</div>
      </section>
      <section class="panel canvasBox" aria-label="グラフ">
        <h3>投影の時間変化（右）</h3>
        <canvas id="graphCanvas" aria-label="サイン波グラフ"></canvas>
        <div class="eq">左端の連結マーカーと、緑の「現在位置」を灰色の点線で接続。モードで描画の見え方を切替。</div>
      </section>
    </div>
  </div>

  <script>
    // ===== DOM =====
    const main = document.getElementById('mainCanvas');
    const graph = document.getElementById('graphCanvas');
    const playBtn = document.getElementById('playPause');
    const resetBtn = document.getElementById('reset');
    const omegaIn = document.getElementById('omega');
    const radiusIn = document.getElementById('radius');
    const phiIn = document.getElementById('phi');
    const omegaVal = document.getElementById('omegaVal');
    const radiusVal = document.getElementById('radiusVal');
    const phiVal = document.getElementById('phiVal');
    const guidesIn = document.getElementById('showGuides');
    const traceIn = document.getElementById('showTrace');
    const lockHeightsIn = document.getElementById('lockHeights');
    const eqArea = document.getElementById('equationArea');
    const axisRadios = Array.from(document.querySelectorAll('input[name="axis"]'));
    const drawModeSel = document.getElementById('drawMode');
    const paperSpeedIn = document.getElementById('paperSpeed');
    const paperSpeedVal = document.getElementById('paperSpeedVal');

    // ===== State =====
    let dpr = Math.max(1, window.devicePixelRatio || 1);
    let paused = true;
    let omega = parseFloat(omegaIn.value);
    let R = parseFloat(radiusIn.value);
    let phi = parseFloat(phiIn.value);
    let axis = 'y';
    let showGuides = guidesIn.checked;
    let showTrace = traceIn.checked;
    let lockHeights = lockHeightsIn.checked;
    let drawMode = drawModeSel.value; // 'window' | 'roll' | 'sweep'
    let paperSpeed = parseFloat(paperSpeedIn.value); // px/s

    let t0 = performance.now() / 1000; // seconds
    let t = 0; // animation time since reset

    // Render geometry (device px)
    let renderR = 100; // updated on draw
    let cx=0, cy=0, px=0, py=0; // left canvas current positions

    // Trace for window mode (time,value)
    const trace = [];
    const TIME_WINDOW = 10; // seconds

    // Offscreens for roll/sweep (cover graph's inner rect only)
    let rollCnv, rollCtx, sweepCnv, sweepCtx;
    let gw=0, gh=0, gx0=0, gy0=0, gx1=0, gy1=0, midY=0; // graph inner geometry
    let lastValPx = 0; // current value in device px

    // Roll mode helpers
    let rollFrac = 0; // accumulated pixel shift
    let rollPrevY = null; // previous y in inner coords

    // Sweep mode helpers
    let sweepX = 0; // inner x position (0..gw-1)
    let sweepPrevY = null;

    // ===== Utils =====
    const fmt = x => (Math.round(x*100)/100).toFixed(2);

    function setEquation(){ eqArea.textContent = (axis === 'x') ? 'x(t) = R cos(ωt + φ)' : 'y(t) = R sin(ωt + φ)'; }

    function fitCanvasSameHeight(h){
      for(const cnv of [main, graph]){
        const box = cnv.parentElement.getBoundingClientRect();
        const w = Math.max(300, box.width - 24);
        cnv.style.width = w + 'px';
        cnv.style.height = h + 'px';
        cnv.width = Math.round(w * dpr);
        cnv.height = Math.round(h * dpr);
      }
      initGraphGeometry();
    }

    function resizeAll(){
      dpr = Math.max(1, window.devicePixelRatio || 1);
      const rowBox = document.querySelector('.row').getBoundingClientRect();
      const targetH = Math.max(280, Math.min(540, rowBox.width * 0.28));
      if(lockHeights) fitCanvasSameHeight(targetH); else {
        const fit = (cnv)=>{const box=cnv.parentElement.getBoundingClientRect();const w=Math.max(300, box.width-24);const h=Math.max(260, Math.min(520, box.width*0.72));cnv.style.width=w+'px';cnv.style.height=h+'px';cnv.width=Math.round(w*dpr);cnv.height=Math.round(h*dpr)};
        fit(main); fit(graph); initGraphGeometry();
      }
    }

    function initGraphGeometry(){
      // set inner rect and offscreens according to current graph size
      const pad = 14 * dpr;
      gx0 = pad; gx1 = graph.width - pad; // symmetric margins
      gy0 = pad; gy1 = graph.height - pad; // symmetric margins (fixed earlier bug)
      gw = Math.max(10, Math.floor(gx1 - gx0));
      gh = Math.max(10, Math.floor(gy1 - gy0));
      midY = Math.round((gy0 + gy1) / 2);

      // (re)create offscreens sized to inner rect (device px)
      rollCnv = document.createElement('canvas'); rollCnv.width = gw; rollCnv.height = gh; rollCtx = rollCnv.getContext('2d'); rollCtx.clearRect(0,0,gw,gh);
      sweepCnv = document.createElement('canvas'); sweepCnv.width = gw; sweepCnv.height = gh; sweepCtx = sweepCnv.getContext('2d'); sweepCtx.clearRect(0,0,gw,gh);
      rollFrac = 0; rollPrevY = null; sweepX = 0; sweepPrevY = null;
    }

    window.addEventListener('resize', resizeAll);
    resizeAll();

    // Clear traces and offscreen buffers (for axis change / reset)
    function resetGraphBuffers(){
      trace.length = 0;
      if (rollCtx) rollCtx.clearRect(0,0,gw,gh);
      if (sweepCtx) sweepCtx.clearRect(0,0,gw,gh);
      rollFrac = 0; rollPrevY = null; sweepX = 0; sweepPrevY = null;
    }

    // Basic drawing helpers
    function line(ctx,x1,y1,x2,y2,color,width=1){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.lineWidth=width*dpr;ctx.strokeStyle=color;ctx.stroke();}
    function dline(ctx,x1,y1,x2,y2,color,width=1,pattern=[6,6]){ctx.save();ctx.setLineDash(pattern.map(v=>v*dpr));line(ctx,x1,y1,x2,y2,color,width);ctx.restore();}
    function circle(ctx,x,y,r,color,fill=false,width=1){ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2); if(fill){ctx.fillStyle=color;ctx.fill()}else{ctx.lineWidth=width*dpr;ctx.strokeStyle=color;ctx.stroke()}}

    // ===== Main (circle & projection) =====
    function drawMain(){
      const ctx = main.getContext('2d');
      ctx.clearRect(0,0,main.width, main.height);
      const W=main.width, H=main.height; cx=W/2; cy=H/2;
      renderR = Math.min(R * dpr, Math.min(W,H)*0.42);

      // circle & axes
      circle(ctx,cx,cy,renderR,'#e5e7eb',false,2);
      if(showGuides){ line(ctx,cx-renderR*1.15,cy,cx+renderR*1.15,cy,'#cbd5e1',1); line(ctx,cx,cy-renderR*1.15,cx,cy+renderR*1.15,'#cbd5e1',1); }

      const theta = omega * t + phi;
      px = cx + renderR*Math.cos(theta);
      // y上向き正: cy - R sinθ
      py = cy - renderR*Math.sin(theta);

      // Emphasize projection axis
      if(axis==='x'){
        line(ctx, cx - renderR*1.25, cy, cx + renderR*1.25, cy, '#94a3b8', 2.5);
      } else {
        const axX = Math.min(W - 18*dpr, cx + renderR + 14*dpr);
        line(ctx, axX, cy - renderR*1.25, axX, cy + renderR*1.25, '#94a3b8', 2.5);
      }

      // Guide from rotating point
      let qx = Math.min(W - 18*dpr, cx + renderR + 14*dpr);
      let qy = cy - lastValPx;
      if(showGuides){ line(ctx,px,py,qx,qy,'#d1d5db',1.2); }

      // Points
      circle(ctx,px,py,6*dpr,'#2563eb',true);
      circle(ctx,qx,qy,6*dpr,'#16a34a',true);

      // Right-edge connector tick & dashed to green dot
      const markY = qy; // height to match
      line(ctx, W-12*dpr, markY, W-2*dpr, markY, '#16a34a', 3);
      // dashed connector from green dot to tick
      dline(ctx, qx, qy, W-2*dpr, markY, '#9ca3af', 1.4, [6,6]);

      // Labels
      ctx.fillStyle='#64748b'; ctx.font=`${Math.max(12,13*dpr)}px system-ui,-apple-system,Segoe UI,Roboto,Noto Sans,Meiryo,sans-serif`;
      ctx.fillText(`θ = ${fmt(omega*t+phi)} rad`, 14*dpr, 22*dpr);
      if(axis==='x') ctx.fillText(`x = ${fmt((px-cx)/dpr)} px`, 14*dpr, 42*dpr); else ctx.fillText(`y = ${fmt((cy-py)/dpr)} px`, 14*dpr, 42*dpr);
    }

    // ===== Graph common frame =====
    function drawGraphFrame(ctx){
      // outer frame
      ctx.strokeStyle='#e5e7eb'; ctx.lineWidth=1*dpr; ctx.strokeRect(gx0, gy0, gx1-gx0, gy1-gy0);
      // midline
      line(ctx, gx0, midY, gx1, midY, '#cbd5e1', 1);
      // vertical grid (each second) only in window mode (others have pixel domain)
      if(drawMode==='window'){
        const nowS = performance.now()/1000 - t0; const tMax = nowS; const tMin = tMax - TIME_WINDOW;
        const ctx2 = ctx; ctx2.fillStyle='#94a3b8'; ctx2.font=`${Math.max(10,12*dpr)}px system-ui,-apple-system,Segoe UI,Roboto,Noto Sans,Meiryo,sans-serif`;
        for(let s=Math.ceil(tMin); s<=Math.floor(tMax); s++){
          const x = gx0 + (s - tMin)/(tMax - tMin) * (gx1 - gx0);
          line(ctx2, x, gy0, x, gy1, '#eef2f7', 1);
          ctx2.textAlign='center'; ctx2.fillText(`${(s - tMax).toFixed(0)}s`, x, gy1 + 12*dpr);
        }
      }
    }

    // ===== Graph (window mode) =====
    function drawGraphWindow(ctx){
      // Remove old points
      const nowS = performance.now()/1000 - t0; const tMax = nowS; const tMin = tMax - TIME_WINDOW; while(trace.length && trace[0].T < tMin) trace.shift();

      if(showTrace && trace.length >= 2){
        const ampPx = renderR; // same scale as left canvas
        ctx.beginPath();
        for(let i=0;i<trace.length;i++){
          const p = trace[i];
          const x = gx0 + (p.T - tMin)/(tMax - tMin) * (gx1 - gx0);
          const y = midY - (p.V / ampPx) * ampPx; // p.V already in px
          if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.lineWidth=2*dpr; ctx.strokeStyle='#2563eb'; ctx.stroke();
      }

      // current marker at last point position
      const last = trace[trace.length-1] || {T: nowS, V: lastValPx};
      const curX = gx0 + (last.T - (nowS - TIME_WINDOW))/(TIME_WINDOW) * (gx1 - gx0);
      const curY = midY - last.V;
      circle(ctx, curX, curY, 5*dpr, '#16a34a', true);

      // feed marker at left border & dashed connector to current marker
      const feedY = getFeedY(midY); // aligns with left canvas
      line(ctx, gx0-10*dpr, feedY, gx0, feedY, '#16a34a', 3);
      dline(ctx, gx0, feedY, curX, curY, '#9ca3af', 1.4, [6,6]);
    }

    // ===== Graph (roll paper-feed) =====
    function drawGraphRoll(ctx, dt){
      const curYin = (gh/2) - lastValPx; // inner coords
      rollFrac += paperSpeed * dpr * dt; // convert px/s to device px per frame
      // shift and draw per whole pixel
      while(rollFrac >= 1){
        // shift left by 1px within inner area
        rollCtx.drawImage(rollCnv, 1, 0, gw-1, gh, 0, 0, gw-1, gh);
        // draw connecting segment at right edge
        const x = gw - 1;
        rollCtx.lineWidth = 2*dpr; rollCtx.strokeStyle = '#2563eb';
        rollCtx.beginPath();
        rollCtx.moveTo(x-1, rollPrevY ?? curYin);
        rollCtx.lineTo(x, curYin);
        rollCtx.stroke();
        rollPrevY = curYin;
        rollFrac -= 1;
      }

      // blit offscreen to visible inner rect
      ctx.drawImage(rollCnv, gx0, gy0);

      // current marker position (pen at right edge)
      const curGX = gx0 + gw - 1; const curGY = gy0 + curYin;
      circle(ctx, curGX, curGY, 5*dpr, '#16a34a', true);

      // feed marker & dashed connector
      const feedY = getFeedY(midY);
      line(ctx, gx0-10*dpr, feedY, gx0, feedY, '#16a34a', 3);
      dline(ctx, gx0, feedY, curGX, curGY, '#9ca3af', 1.4, [6,6]);
    }

    // ===== Graph (sweep left->right) =====
    function drawGraphSweep(ctx, dt){
      const curYin = (gh/2) - lastValPx; // inner coords
      // advance pen
      const dx = paperSpeed * dpr * dt; // device px
      let targetX = sweepX + dx;
      if(sweepPrevY == null) sweepPrevY = curYin;

      // draw incremental line(s) from sweepX..targetX (can be fractional)
      sweepCtx.lineWidth = 2*dpr; sweepCtx.strokeStyle = '#2563eb';
      while(targetX - sweepX >= 1){
        const x1 = Math.floor(sweepX); const x2 = x1 + 1;
        const y1 = sweepPrevY; const y2 = curYin; // simple connect; could interpolate if desired
        sweepCtx.beginPath();
        sweepCtx.moveTo(x1, y1);
        sweepCtx.lineTo(x2, y2);
        sweepCtx.stroke();
        sweepPrevY = y2; sweepX = x2;
      }
      sweepX = targetX;

      // wrap: when reaching end, clear and restart from left
      if(sweepX >= gw){ sweepCtx.clearRect(0,0,gw,gh); sweepX = 0; sweepPrevY = curYin; }

      // blit
      ctx.drawImage(sweepCnv, gx0, gy0);

      // current marker at (gx0 + sweepX, curYin)
      const curGX = gx0 + Math.floor(sweepX); const curGY = gy0 + curYin;
      circle(ctx, curGX, curGY, 5*dpr, '#16a34a', true);

      // feed marker & dashed connector
      const feedY = getFeedY(midY);
      line(ctx, gx0-10*dpr, feedY, gx0, feedY, '#16a34a', 3);
      dline(ctx, gx0, feedY, curGX, curGY, '#9ca3af', 1.4, [6,6]);
    }

    // ===== Graph dispatcher =====
    function drawGraph(dt){
      const ctx = graph.getContext('2d');
      ctx.clearRect(0,0,graph.width, graph.height);
      drawGraphFrame(ctx);
      if(drawMode==='window') drawGraphWindow(ctx);
      else if(drawMode==='roll') drawGraphRoll(ctx, dt);
      else drawGraphSweep(ctx, dt);
    }

    function getFeedY(midY){
      // Align graph left feed marker with the green projected point height (same value lastValPx)
      return midY - lastValPx;
    }

    // ===== Animation Loop =====
    let lastTS = performance.now();
    function loop(ts){
      const dt = (ts - lastTS)/1000; lastTS = ts; if(!paused) t += dt;

      // current value in device px against center, matching left canvas scale
      const theta = omega * t + phi;
      lastValPx = (axis==='x') ? renderR*Math.cos(theta) : renderR*Math.sin(theta);

      // update trace for window mode only
      const absNow = performance.now()/1000 - t0;
      trace.push({T: absNow, V: lastValPx});

      drawMain();
      drawGraph(dt);
      requestAnimationFrame(loop);
    }

    // ===== UI =====
    function setPlayState(next){ paused = !next; playBtn.textContent = paused ? '▶ 再生' : '⏸ 一時停止'; playBtn.classList.toggle('primary', paused); }
    playBtn.addEventListener('click', ()=> setPlayState(paused));
    resetBtn.addEventListener('click', ()=>{ t = 0; resetGraphBuffers(); });

    omegaIn.addEventListener('input', e=>{ omega=parseFloat(e.target.value); omegaVal.textContent=omega.toFixed(1); });
    radiusIn.addEventListener('input', e=>{ R=parseFloat(e.target.value); radiusVal.textContent=R.toFixed(0); });
    phiIn.addEventListener('input', e=>{ phi=parseFloat(e.target.value); phiVal.textContent=fmt(phi); });
    guidesIn.addEventListener('change', e=> showGuides = e.target.checked);
    traceIn.addEventListener('change', e=> showTrace = e.target.checked);
    lockHeightsIn.addEventListener('change', e=>{ lockHeights = e.target.checked; resizeAll(); });
    drawModeSel.addEventListener('change', e=>{ drawMode = e.target.value; });
    paperSpeedIn.addEventListener('input', e=>{ paperSpeed = parseFloat(e.target.value); paperSpeedVal.textContent = paperSpeed.toFixed(0); });

    axisRadios.forEach(r => r.addEventListener('change', ()=>{ axis = axisRadios.find(x => x.checked).value; setEquation(); resetGraphBuffers(); }));
    setEquation(); omegaVal.textContent=omega.toFixed(1); radiusVal.textContent=R.toFixed(0); phiVal.textContent=fmt(phi); paperSpeedVal.textContent=paperSpeed.toFixed(0);
    requestAnimationFrame(loop);
  </script>
</body>
</html>
