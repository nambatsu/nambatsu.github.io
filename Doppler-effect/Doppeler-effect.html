<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ドップラー効果 2Dアニメーション</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: rgba(11, 22, 40, 0.88);
      --line: rgba(255,255,255,0.12);
      --text: #e8f0ff;
      --sub: #9fb3d9;
      --accent: #63b3ff;
      --accent2: #7cf2c6;
      --danger: #ff8f8f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, #0f2342 0%, #08111f 45%, #040912 100%);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .app {
      width: min(1100px, 100%);
      display: grid;
      grid-template-columns: 330px 1fr;
      gap: 18px;
    }

    .panel, .stage-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
    }

    .panel {
      padding: 18px;
    }

    h1 {
      font-size: 1.4rem;
      margin: 0 0 8px;
    }

    p.desc {
      margin: 0 0 16px;
      color: var(--sub);
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .control {
      margin: 16px 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .value {
      color: var(--accent2);
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      color: #04101e;
      background: linear-gradient(135deg, #8ad1ff, #7cf2c6);
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button.secondary {
      color: var(--text);
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--line);
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,0.03);
    }

    .stat .k {
      display: block;
      color: var(--sub);
      font-size: 0.85rem;
      margin-bottom: 4px;
    }

    .stat .v {
      font-size: 1.05rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .note {
      margin-top: 16px;
      color: var(--sub);
      line-height: 1.65;
      font-size: 0.92rem;
    }

    .stage-wrap {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 16px;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at center, rgba(34, 72, 135, 0.26) 0%, rgba(8, 17, 31, 0.45) 45%, rgba(5, 10, 19, 0.9) 100%);
    }

    .legend {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      color: var(--sub);
      font-size: 0.9rem;
      padding: 0 4px 2px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
    }

    .blue { background: #71baff; }
    .green { background: #7cf2c6; }
    .red { background: #ff8f8f; }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="panel">
      <h1>ドップラー効果 2Dアニメーション</h1>
      <p class="desc">
        動く音源が一定時間ごとに波を出し、各波が二次元の円として広がります。<br>
        音源が進む向きでは波面が密になり、後ろ側では疎になる様子を確認できます。
      </p>

      <div class="control">
        <div class="label-row">
          <span>音源の速さ</span>
          <span class="value" id="sourceSpeedValue">120 px/s</span>
        </div>
        <input id="sourceSpeed" type="range" min="0" max="320" step="1" value="120" />
      </div>

      <div class="control">
        <div class="label-row">
          <span>波の速さ</span>
          <span class="value" id="waveSpeedValue">180 px/s</span>
        </div>
        <input id="waveSpeed" type="range" min="60" max="360" step="1" value="180" />
      </div>

      <div class="control">
        <div class="label-row">
          <span>波の発生間隔</span>
          <span class="value" id="emitIntervalValue">0.40 s</span>
        </div>
        <input id="emitInterval" type="range" min="0.15" max="1.00" step="0.01" value="0.40" />
      </div>

      <div class="buttons">
        <button id="toggleBtn">一時停止</button>
        <button id="resetBtn" class="secondary">リセット</button>
      </div>

      <div class="stats">
        <div class="stat">
          <span class="k">音源速度 / 波速度</span>
          <span class="v" id="ratioValue">0.67</span>
        </div>
        <div class="stat">
          <span class="k">状態</span>
          <span class="v" id="stateValue">通常</span>
        </div>
        <div class="stat">
          <span class="k">前方の波長</span>
          <span class="v" id="frontLambda">24.0 px</span>
        </div>
        <div class="stat">
          <span class="k">後方の波長</span>
          <span class="v" id="backLambda">96.0 px</span>
        </div>
      </div>

      <div class="note">
        音源速度が波速度に近づくほど、進行方向前方の波面は強く詰まります。<br>
        音源速度が波速度を超えると、波面が後方へ重なり、衝撃波のような形が現れます。
      </div>
    </section>

    <section class="stage-wrap">
      <canvas id="canvas" width="740" height="520"></canvas>
      <div class="legend">
        <span><span class="dot blue"></span>広がる円形波</span>
        <span><span class="dot green"></span>現在の音源</span>
        <span><span class="dot red"></span>進行方向</span>
      </div>
    </section>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const sourceSpeedSlider = document.getElementById('sourceSpeed');
    const waveSpeedSlider = document.getElementById('waveSpeed');
    const emitIntervalSlider = document.getElementById('emitInterval');

    const sourceSpeedValue = document.getElementById('sourceSpeedValue');
    const waveSpeedValue = document.getElementById('waveSpeedValue');
    const emitIntervalValue = document.getElementById('emitIntervalValue');
    const ratioValue = document.getElementById('ratioValue');
    const stateValue = document.getElementById('stateValue');
    const frontLambda = document.getElementById('frontLambda');
    const backLambda = document.getElementById('backLambda');

    const toggleBtn = document.getElementById('toggleBtn');
    const resetBtn = document.getElementById('resetBtn');

    const waves = [];

    let running = true;
    let lastTime = performance.now();
    let emitTimer = 0;
    let simTime = 0;

    const source = {
      x: 120,
      y: canvas.height / 2,
      radius: 9
    };

    const margin = 80;

    function getSourceSpeed() {
      return Number(sourceSpeedSlider.value);
    }

    function getWaveSpeed() {
      return Number(waveSpeedSlider.value);
    }

    function getEmitInterval() {
      return Number(emitIntervalSlider.value);
    }

    function updateLabels() {
      const vs = getSourceSpeed();
      const vw = getWaveSpeed();
      const dt = getEmitInterval();
      const ratio = vs / vw;

      sourceSpeedValue.textContent = `${vs.toFixed(0)} px/s`;
      waveSpeedValue.textContent = `${vw.toFixed(0)} px/s`;
      emitIntervalValue.textContent = `${dt.toFixed(2)} s`;
      ratioValue.textContent = ratio.toFixed(2);

      const front = Math.max(0, (vw - vs) * dt);
      const back = (vw + vs) * dt;
      frontLambda.textContent = `${front.toFixed(1)} px`;
      backLambda.textContent = `${back.toFixed(1)} px`;

      if (ratio < 1) {
        stateValue.textContent = '通常';
      } else if (Math.abs(ratio - 1) < 0.03) {
        stateValue.textContent = '音速付近';
      } else {
        stateValue.textContent = '超音速';
      }
    }

    function emitWave() {
      waves.push({
        x: source.x,
        y: source.y,
        birth: simTime
      });
    }

    function resetSimulation() {
      waves.length = 0;
      source.x = 120;
      simTime = 0;
      emitTimer = 0;
      emitWave();
      updateLabels();
    }

    function drawBackground() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;
      for (let x = 0; x <= canvas.width; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= canvas.height; y += 40) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
      ctx.restore();

      ctx.save();
      ctx.strokeStyle = 'rgba(124, 242, 198, 0.18)';
      ctx.setLineDash([7, 7]);
      ctx.beginPath();
      ctx.moveTo(0, canvas.height / 2);
      ctx.lineTo(canvas.width, canvas.height / 2);
      ctx.stroke();
      ctx.restore();
    }

    function drawWaves() {
      const waveSpeed = getWaveSpeed();
      for (let i = 0; i < waves.length; i++) {
        const wave = waves[i];
        const age = simTime - wave.birth;
        const r = waveSpeed * age;

        if (r > Math.hypot(canvas.width, canvas.height) + 60) continue;

        const alpha = Math.max(0, 0.9 - r / 650);
        ctx.beginPath();
        ctx.arc(wave.x, wave.y, r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(113, 186, 255, ${alpha})`;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    function drawSource() {
      ctx.save();

      const grd = ctx.createRadialGradient(source.x, source.y, 2, source.x, source.y, 24);
      grd.addColorStop(0, 'rgba(124, 242, 198, 0.95)');
      grd.addColorStop(1, 'rgba(124, 242, 198, 0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(source.x, source.y, 24, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = 'rgba(124, 242, 198, 1)';
      ctx.beginPath();
      ctx.arc(source.x, source.y, source.radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = 'rgba(255,255,255,0.8)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      ctx.strokeStyle = 'rgba(255,143,143,0.95)';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(source.x + 18, source.y);
      ctx.lineTo(source.x + 48, source.y);
      ctx.lineTo(source.x + 38, source.y - 7);
      ctx.moveTo(source.x + 48, source.y);
      ctx.lineTo(source.x + 38, source.y + 7);
      ctx.stroke();

      ctx.restore();
    }

    function drawInfoOnCanvas() {
      const vs = getSourceSpeed();
      const vw = getWaveSpeed();
      const dt = getEmitInterval();
      const ratio = vs / vw;

      ctx.save();
      ctx.fillStyle = 'rgba(7, 15, 28, 0.72)';
      ctx.fillRect(16, 16, 220, 78);
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.strokeRect(16, 16, 220, 78);

      ctx.fillStyle = '#e8f0ff';
      ctx.font = '14px system-ui, sans-serif';
      ctx.fillText(`音源速度: ${vs.toFixed(0)} px/s`, 28, 41);
      ctx.fillText(`波の速度: ${vw.toFixed(0)} px/s`, 28, 62);
      ctx.fillText(`発生間隔: ${dt.toFixed(2)} s   比: ${ratio.toFixed(2)}`, 28, 83);
      ctx.restore();
    }

    function step(dt) {
      const sourceSpeed = getSourceSpeed();
      const emitInterval = getEmitInterval();

      source.x += sourceSpeed * dt;
      if (source.x > canvas.width - margin) {
        source.x = margin;
        waves.length = 0;
        emitTimer = 0;
        emitWave();
      }

      emitTimer += dt;
      while (emitTimer >= emitInterval) {
        emitWave();
        emitTimer -= emitInterval;
      }

      simTime += dt;
    }

    function render() {
      drawBackground();
      drawWaves();
      drawSource();
      drawInfoOnCanvas();
    }

    function animate(now) {
      let dt = (now - lastTime) / 1000;
      lastTime = now;
      dt = Math.min(dt, 0.04);

      if (running) step(dt);
      render();
      requestAnimationFrame(animate);
    }

    sourceSpeedSlider.addEventListener('input', updateLabels);
    waveSpeedSlider.addEventListener('input', updateLabels);
    emitIntervalSlider.addEventListener('input', updateLabels);

    toggleBtn.addEventListener('click', () => {
      running = !running;
      toggleBtn.textContent = running ? '一時停止' : '再開';
    });

    resetBtn.addEventListener('click', () => {
      running = true;
      toggleBtn.textContent = '一時停止';
      resetSimulation();
      render();
    });

    window.addEventListener('resize', () => {
      render();
    });

    updateLabels();
    resetSimulation();
    render();
    requestAnimationFrame((t) => {
      lastTime = t;
      requestAnimationFrame(animate);
    });
  </script>
</body>
</html>
